# nginx front for ProcTree. Serves the SPA and reverse-proxies /api to the
# FastAPI backend. SSE buffering is disabled so job streams flush in real time.

limit_req_zone $binary_remote_addr zone=proctree_api:10m rate=60r/m;

upstream proctree_backend {
    server backend:8799;
    keepalive 16;
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (CSP kept permissive for inline D3-driven styles).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    client_max_body_size 8m;

    # Static SPA assets with long cache; index.html stays fresh.
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Detection rule files (served from SPA origin for offline analysis).
    location /rules/ {
        default_type application/json;
        expires 1h;
    }

    # Job event stream — must not be buffered.
    location ~ ^/api/jobs/.+/stream$ {
        proxy_pass http://proctree_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header X-Accel-Buffering "no" always;
    }

    # API proxy with rate limiting.
    location /api/ {
        limit_req zone=proctree_api burst=20 nodelay;
        proxy_pass http://proctree_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 920s;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
